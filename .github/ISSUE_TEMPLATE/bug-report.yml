---
name: "🐛 Bug Report"
description: Report a bug
title: "(short issue description)"
labels: [bug]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: What is the problem? A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: false

  - type: textarea
    id: current
    attributes:
      label: Current Behavior
      description: What actually happened? (Include any error messages)
    validations:
      required: false

  - type: input
    id: plugin-version
    attributes:
      label: eslint-plugin-awscdk Version
      description: Which version of eslint-plugin-awscdk are you using?
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: eslint-version
    attributes:
      label: ESLint Version
      description: E.g. 10.0.0
    validations:
      required: false

  - type: input
    id: language-version
    attributes:
      label: Language Version
      description: E.g. TypeScript (5.4.5)
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: |
        Add any other context about the problem here:
        - IDE/Editor
        - Package Manager (npm/yarn/pnpm)
        - Screenshots (if applicable)
    validations:
      required: false
